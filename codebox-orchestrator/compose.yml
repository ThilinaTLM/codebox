services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - orchestrator-data:/data
      - /tmp/codebox-workspaces:/workspaces
    env_file:
      - .env
      - path: .env.local
        required: false
    networks:
      - codebox-net

networks:
  codebox-net:
    name: codebox-net
    driver: bridge

volumes:
  orchestrator-data:
