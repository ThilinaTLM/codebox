syntax = "proto3";
package codebox.box;

service BoxService {
  // Opened once on container startup. Stays open for the container's lifetime.
  // Box sends canonical stream events and query responses.
  // Orchestrator sends commands and protocol-level queries.
  rpc Connect(stream BoxEvent) returns (stream BoxCommand);
}

// ══════════════════════════════════════════════════
// Box → Orchestrator
// ══════════════════════════════════════════════════

message BoxEvent {
  oneof event {
    RegisterEvent register     = 1;
    StreamEvent   stream_event = 2;
    QueryResult   query_result = 3;
    Heartbeat     heartbeat    = 4;
  }
}

message RegisterEvent {
  string session_id = 1;
}

message StreamEvent {
  int64  seq          = 1;
  string event_id     = 2;
  int64  timestamp_ms = 3;
  string run_id       = 4;
  string turn_id      = 5;
  string message_id   = 6;
  string tool_call_id = 7;
  string command_id   = 8;

  oneof payload {
    RunStarted                 run_started                   = 20;
    RunCompleted               run_completed                 = 21;
    RunFailed                  run_failed                    = 22;
    RunCancelled               run_cancelled                 = 23;
    TurnStarted                turn_started                  = 24;
    TurnCompleted              turn_completed                = 25;
    MessageStarted             message_started               = 26;
    MessageDelta               message_delta                 = 27;
    MessageCompleted           message_completed             = 28;
    ReasoningStarted           reasoning_started             = 29;
    ReasoningDelta             reasoning_delta               = 30;
    ReasoningCompleted         reasoning_completed           = 31;
    ToolCallStarted            tool_call_started             = 32;
    ToolCallArgumentsDelta     tool_call_arguments_delta     = 33;
    ToolCallArgumentsCompleted tool_call_arguments_completed = 34;
    ToolCallCompleted          tool_call_completed           = 35;
    ToolCallFailed             tool_call_failed              = 36;
    CommandStarted             command_started               = 37;
    CommandOutputDelta         command_output_delta          = 38;
    CommandCompleted           command_completed             = 39;
    CommandFailed              command_failed                = 40;
    StateChanged               state_changed                 = 41;
    OutcomeDeclared            outcome_declared              = 42;
    InputRequested             input_requested               = 43;
  }
}

message RunStarted {
  string trigger = 1;
  string input   = 2;
}

message RunCompleted {
  string summary = 1;
}

message RunFailed {
  string error = 1;
}

message RunCancelled {}

message TurnStarted {}

message TurnCompleted {}

message MessageStarted {
  string role = 1;
}

message MessageDelta {
  string text = 1;
}

message MessageCompleted {
  string role    = 1;
  string content = 2;
}

message ReasoningStarted {}

message ReasoningDelta {
  string text = 1;
}

message ReasoningCompleted {}

message ToolCallStarted {
  string name = 1;
}

message ToolCallArgumentsDelta {
  string text = 1;
}

message ToolCallArgumentsCompleted {
  string arguments_json = 1;
}

message ToolCallCompleted {
  string name   = 1;
  string output = 2;
}

message ToolCallFailed {
  string name   = 1;
  string error  = 2;
  string output = 3;
}

enum CommandOrigin {
  COMMAND_ORIGIN_UNSPECIFIED = 0;
  COMMAND_ORIGIN_AGENT_TOOL  = 1;
  COMMAND_ORIGIN_USER_EXEC   = 2;
}

message CommandStarted {
  CommandOrigin origin          = 1;
  string        command         = 2;
  int32         timeout_seconds = 3;
}

message CommandOutputDelta {
  string text = 1;
}

message CommandCompleted {
  CommandOrigin origin    = 1;
  int32         exit_code = 2;
  string        output    = 3;
}

message CommandFailed {
  CommandOrigin origin    = 1;
  int32         exit_code = 2;
  string        error     = 3;
  string        output    = 4;
}

message StateChanged {
  string activity = 1;
}

message OutcomeDeclared {
  string status  = 1;
  string message = 2;
}

message InputRequested {
  string          message   = 1;
  repeated string questions = 2;
}

// ── Query results (protocol-level request/response) ──

message QueryResult {
  string request_id = 1;  // Echoed from the Query that triggered this
  oneof result {
    ListFilesResult list_files = 2;
    ReadFileResult  read_file  = 3;
    ExecResult      exec       = 4;
  }
}

message ListFilesResult {
  repeated FileEntry entries = 1;
  string error               = 2;
}

message FileEntry {
  string name     = 1;
  string path     = 2;
  bool   is_dir   = 3;
  int64  size     = 4;
  string modified = 5;
}

message ReadFileResult {
  string content   = 1;
  string encoding  = 2;  // "utf-8", "base64"
  bool   truncated = 3;
  string error     = 4;
}

message ExecResult {
  int32  exit_code = 1;
  string stdout    = 2;
  string stderr    = 3;
  string error     = 4;
}

// ══════════════════════════════════════════════════
// Orchestrator → Box
// ══════════════════════════════════════════════════

message BoxCommand {
  oneof command {
    RegisteredAck registered = 1;
    SendMessage   message    = 2;
    CancelTask    cancel     = 3;
    Query         query      = 4;
    Heartbeat     heartbeat  = 5;
  }
}

message Heartbeat {}

message RegisteredAck {}

message SendMessage {
  string content    = 1;
  string run_id     = 2;
  string message_id = 3;
}

message CancelTask {}

// ── Query requests ──

message Query {
  string request_id = 1;  // Generated by orchestrator, echoed in QueryResult
  oneof request {
    ListFilesQuery list_files = 2;
    ReadFileQuery  read_file  = 3;
    ExecQuery      exec       = 4;
  }
}

message ListFilesQuery {
  string path = 1;
}

message ReadFileQuery {
  string path = 1;
}

message ExecQuery {
  string command    = 1;
  string run_id     = 2;
  string command_id = 3;
}
