syntax = "proto3";
package codebox.box;

service BoxService {
  // Opened once on container startup. Stays open for the container's lifetime.
  // Box sends events (agent output, state changes, query results).
  // Orchestrator sends commands (messages, cancellation, queries).
  rpc Connect(stream BoxEvent) returns (stream BoxCommand);
}

// ══════════════════════════════════════════════════
// Box → Orchestrator
// ══════════════════════════════════════════════════

message BoxEvent {
  oneof event {
    // Lifecycle
    RegisterEvent register     = 1;
    DoneEvent     done         = 2;
    ErrorEvent    error        = 3;

    // Real-time agent output (grouped)
    AgentOutput   agent_output = 4;

    // State changes (grouped)
    StateChange   state_change = 5;

    // Query responses (protocol-level request/response)
    QueryResult   query_result = 6;
  }
}

// ── Lifecycle ──

message RegisterEvent {
  string session_id = 1;
}

message DoneEvent {
  string content = 1;
}

message ErrorEvent {
  string detail = 1;
}

// ── Agent output (8 sub-variants) ──

message AgentOutput {
  oneof payload {
    TokenChunk       token             = 1;
    ThinkingChunk    thinking          = 2;
    ModelStarted     model_started     = 3;
    ToolStarted      tool_started      = 4;
    ToolOutput       tool_output       = 5;
    ToolFinished     tool_finished     = 6;
    MessageCompleted message_completed = 7;
    ExecChunk        exec_chunk        = 8;
  }
}

message TokenChunk {
  string text = 1;
}

message ThinkingChunk {
  string text = 1;
}

message ModelStarted {}

message ToolStarted {
  string name         = 1;
  string tool_call_id = 2;
  string input_json   = 3;
}

message ToolOutput {
  string output       = 1;
  string tool_call_id = 2;
}

message ToolFinished {
  string name   = 1;
  string output = 2;
}

message MessageCompleted {
  ChatMessage message = 1;
}

// Streaming exec output (real-time chunks while command runs)
message ExecChunk {
  string output     = 1;
  string request_id = 2;  // Links to the Query that started this exec
}

// ── State changes ──

message StateChange {
  oneof change {
    ActivityChanged activity = 1;
    TaskOutcome     outcome  = 2;
  }
}

message ActivityChanged {
  string status = 1;  // "idle", "agent_working", "exec_shell"
}

message TaskOutcome {
  string status  = 1;  // "completed", "in_progress", "need_clarification"
  string message = 2;
}

// ── Query results (protocol-level request/response) ──

message QueryResult {
  string request_id = 1;  // Echoed from the Query that triggered this
  oneof result {
    ListFilesResult   list_files    = 2;
    ReadFileResult    read_file     = 3;
    ExecResult        exec          = 4;
    GetMessagesResult get_messages  = 5;
    GetBoxStateResult get_box_state = 6;
  }
}

message ListFilesResult {
  repeated FileEntry entries = 1;
  string error               = 2;
}

message FileEntry {
  string name     = 1;
  string path     = 2;
  bool   is_dir   = 3;
  int64  size     = 4;
  string modified = 5;
}

message ReadFileResult {
  string content   = 1;
  string encoding  = 2;  // "utf-8", "base64"
  bool   truncated = 3;
  string error     = 4;
}

message ExecResult {
  int32  exit_code = 1;
  string stdout    = 2;
  string stderr    = 3;
  string error     = 4;
}

message GetMessagesResult {
  repeated ChatMessage messages = 1;
}

message GetBoxStateResult {
  string activity             = 1;
  string task_outcome         = 2;
  string task_outcome_message = 3;
}

// ══════════════════════════════════════════════════
// Orchestrator → Box
// ══════════════════════════════════════════════════

message BoxCommand {
  oneof command {
    // Lifecycle
    RegisteredAck registered = 1;

    // Real-time commands
    SendMessage   message    = 2;
    CancelTask    cancel     = 3;

    // Query requests (protocol-level request/response)
    Query         query      = 4;
  }
}

message RegisteredAck {}

message SendMessage {
  string content = 1;
}

message CancelTask {}

// ── Query requests ──

message Query {
  string request_id = 1;  // Generated by orchestrator, echoed in QueryResult
  oneof request {
    ListFilesQuery   list_files    = 2;
    ReadFileQuery    read_file     = 3;
    ExecQuery        exec          = 4;
    GetMessagesQuery get_messages  = 5;
    GetBoxStateQuery get_box_state = 6;
  }
}

message ListFilesQuery {
  string path = 1;
}

message ReadFileQuery {
  string path = 1;
}

message ExecQuery {
  string command = 1;
}

message GetMessagesQuery {}

message GetBoxStateQuery {}

// ══════════════════════════════════════════════════
// Shared types
// ══════════════════════════════════════════════════

message ChatMessage {
  string role              = 1;
  string content           = 2;
  repeated ToolCall tool_calls = 3;
  string tool_call_id      = 4;
  string tool_name         = 5;
  string metadata_json     = 6;
}

message ToolCall {
  string id        = 1;
  string name      = 2;
  string args_json = 3;
}
