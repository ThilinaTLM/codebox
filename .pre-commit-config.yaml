repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type checker)
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: >-
          (?x)^(
            .*\.lock$|
            pnpm-lock\.yaml$|
            .*grpc/generated/.*
          )$

  - repo: local
    hooks:
      - id: detect-secrets-strip-timestamp
        name: strip detect-secrets timestamp
        entry: python3 -c "import json, sys; f='.secrets.baseline'; d=json.load(open(f)); changed=d.pop('generated_at',None) is not None; open(f,'w').write(json.dumps(d,indent=2)+'\n') if changed else None"
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
