repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type checker)
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: >-
          (?x)^(
            .*\.lock$|
            pnpm-lock\.yaml$|
            .*grpc/generated/.*
          )$

  - repo: local
    hooks:
      - id: detect-secrets-strip-timestamp
        name: strip detect-secrets timestamp
        # If .secrets.baseline is staged with a `generated_at` field (left over
        # from `make secrets` / `detect-secrets scan`), strip it and re-stage
        # so the commit goes through clean instead of failing.
        entry: bash -c 'f=.secrets.baseline; python3 -c "import json,sys; p=sys.argv[1]; d=json.load(open(p)); changed=d.pop(\"generated_at\",None) is not None; open(p,\"w\").write(json.dumps(d,indent=2)+chr(10)) if changed else None; sys.exit(0 if not changed else 1)" "$f" || git add "$f"'
        language: system
        files: ^\.secrets\.baseline$
        pass_filenames: false
        stages: [pre-commit]
