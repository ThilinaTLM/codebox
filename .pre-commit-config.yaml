repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type checker)
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: >-
          (?x)^(
            .*\.lock$|
            pnpm-lock\.yaml$|
            .*grpc/generated/.*
          )$

  - repo: local
    hooks:
      - id: detect-secrets-strip-timestamp
        name: strip detect-secrets timestamp
        entry: bash -c 'if git diff --name-only | grep -q "^\.secrets\.baseline$"; then if [ -z "$(git diff .secrets.baseline | grep "^[+-]" | grep -v "^[+-][+-][+-]" | grep -v generated_at)" ]; then git checkout .secrets.baseline; fi; fi'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
