name: 'Codebox Agent'
description: 'AI coding agent triggered by issue comments'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  llm-provider:
    description: 'LLM provider identifier ("openai" or "openrouter")'
    required: false
    default: 'openrouter'
  llm-model:
    description: 'LLM model identifier (e.g. "gpt-4o", "anthropic/claude-sonnet-4")'
    required: false
  llm-api-key:
    description: 'API key for the selected LLM provider'
    required: false
  llm-base-url:
    description: 'Custom base URL for OpenAI-compatible providers (optional)'
    required: false
  tavily-api-key:
    description: 'Tavily API key for web search (optional)'
    required: false
  trigger-keyword:
    description: 'Comment keyword that triggers the agent'
    required: false
    default: '/codebox'
  agent-system-prompt:
    description: 'Additional system prompt appended after the core and environment prompts (optional)'
    required: false
  agent-recursion-limit:
    description: 'Maximum agent graph recursion (optional; default 300 in GitHub Action context)'
    required: false
  agent-execute-timeout:
    description: 'Default per-command timeout for the execute tool, seconds (optional)'
    required: false
  log-mode:
    description: 'Logging mode: "human" for clean readable output (default), "debug" for verbose technical logs'
    required: false
    default: 'human'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install codebox
      shell: bash
      run: uv pip install --system ${{ github.action_path }}/../codebox-agent ${{ github.action_path }}

    - name: Run agent
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        CODEBOX_LLM_PROVIDER: ${{ inputs.llm-provider }}
        CODEBOX_LLM_MODEL: ${{ inputs.llm-model }}
        CODEBOX_LLM_API_KEY: ${{ inputs.llm-api-key }}
        CODEBOX_LLM_BASE_URL: ${{ inputs.llm-base-url }}
        CODEBOX_TAVILY_API_KEY: ${{ inputs.tavily-api-key }}
        CODEBOX_TRIGGER_KEYWORD: ${{ inputs.trigger-keyword }}
        CODEBOX_AGENT_SYSTEM_PROMPT: ${{ inputs.agent-system-prompt }}
        CODEBOX_AGENT_RECURSION_LIMIT: ${{ inputs.agent-recursion-limit }}
        CODEBOX_AGENT_EXECUTE_TIMEOUT: ${{ inputs.agent-execute-timeout }}
        CODEBOX_LOG_MODE: ${{ inputs.log-mode }}
      run: python -m codebox_github_action
