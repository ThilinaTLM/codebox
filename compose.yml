services:
  orchestrator:
    build:
      context: ./codebox-orchestrator
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - orchestrator-data:/data
      - /tmp/codebox-workspaces:/tmp/codebox-workspaces
    env_file:
      - ./codebox-orchestrator/.env
      - path: ./codebox-orchestrator/.env.compose
        required: false
    environment:
      CORS_ORIGINS: "http://localhost:3737"
    networks:
      - codebox-net

  web-ui:
    build:
      context: ./codebox-web-ui
      dockerfile: Dockerfile
    ports:
      - "3737:3737"
    environment:
      API_URL: "http://localhost:9090"
    depends_on:
      - orchestrator
    networks:
      - codebox-net

networks:
  codebox-net:
    name: codebox-net
    driver: bridge

volumes:
  orchestrator-data:
