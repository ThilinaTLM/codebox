services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: codebox
      POSTGRES_PASSWORD: codebox
      POSTGRES_DB: codebox
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - codebox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codebox"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: ./codebox-orchestrator
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
      - "50051:50051"
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: mount certs for gRPC TLS (generate with scripts/generate_grpc_certs.sh)
      # - ./certs:/etc/grpc-certs:ro
    environment:
      # ── Database ───────────────────────────────────────────────
      DATABASE_URL: "postgresql+asyncpg://codebox:codebox@postgres:5432/codebox"

      # ── Box image ──────────────────────────────────────────────
      # Build with: docker build -t codebox-sandbox:latest ./codebox-sandbox
      CODEBOX_BOX_IMAGE: "codebox-sandbox:latest"

      # ── URLs sandboxes use to reach this orchestrator ─────────
      # Compose-internal service names; override only if renaming services.
      CODEBOX_ORCHESTRATOR_URL: "http://codebox-orchestrator:9090"
      CODEBOX_ORCHESTRATOR_GRPC_URL: "grpc://codebox-orchestrator:50051"

      # ── Web UI base URL (for GitHub manifest/install post-redirects) ─
      # Required when the UI is served on a different host than the API
      # (e.g. production). When unset, the orchestrator emits a relative
      # redirect, which only works when UI + API share a host (local dev).
      # CODEBOX_ORCHESTRATOR_UI_URL: "https://codebox.example.com"

      # ── Web UI CORS ────────────────────────────────────────────
      CODEBOX_CORS_ORIGINS: "http://localhost:3737"

      # ── Initial admin (first-time bootstrap only) ──
      # Only consulted when the users table is empty. After that the admin
      # manages their own password from the account page.
      CODEBOX_ADMIN_USERNAME: ${CODEBOX_ADMIN_USERNAME:-}
      CODEBOX_ADMIN_PASSWORD: ${CODEBOX_ADMIN_PASSWORD:-}

      # ── Required secrets ──────────────────────────────────────
      # Set via shell env or a repo-root .env file. Examples:
      #   CODEBOX_ENCRYPTION_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
      #   CODEBOX_AUTH_SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(64))")
      #   CODEBOX_CALLBACK_SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(64))")
      CODEBOX_ENCRYPTION_KEY: ${CODEBOX_ENCRYPTION_KEY:?CODEBOX_ENCRYPTION_KEY must be set}
      CODEBOX_AUTH_SECRET: ${CODEBOX_AUTH_SECRET:?CODEBOX_AUTH_SECRET must be set}
      CODEBOX_CALLBACK_SECRET: ${CODEBOX_CALLBACK_SECRET:?CODEBOX_CALLBACK_SECRET must be set}

      # ── Optional: gRPC TLS ─────────────────────────────────────
      # Uncomment together with the certs volume above.
      # CODEBOX_GRPC_TLS_CERT: "/etc/grpc-certs/server.crt"
      # CODEBOX_GRPC_TLS_KEY: "/etc/grpc-certs/server.key"
      # CODEBOX_GRPC_TLS_CA_CERT: "/etc/grpc-certs/ca.crt"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codebox-net
      - codebox-sandbox-net  # Reachable by sandbox containers for gRPC callbacks

  web-ui:
    build:
      context: ./codebox-web-ui
      dockerfile: Dockerfile
    ports:
      - "3737:3737"
    environment:
      CODEBOX_API_URL: "http://localhost:9090"
    depends_on:
      - orchestrator
    networks:
      - codebox-net

networks:
  codebox-net:
    name: codebox-net
    driver: bridge
  codebox-sandbox-net:
    name: codebox-sandbox-net
    driver: bridge

volumes:
  postgres-data:
