services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: codebox
      POSTGRES_PASSWORD: codebox
      POSTGRES_DB: codebox
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - codebox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codebox"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: ./codebox-orchestrator
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/codebox-workspaces:/tmp/codebox-workspaces
    env_file:
      - ./codebox-orchestrator/.env
      - path: ./codebox-orchestrator/.env.compose
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://codebox:codebox@postgres:5432/codebox"
      CORS_ORIGINS: "http://localhost:3737"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codebox-net

  web-ui:
    build:
      context: ./codebox-web-ui
      dockerfile: Dockerfile
    ports:
      - "3737:3737"
    environment:
      API_URL: "http://localhost:9090"
    depends_on:
      - orchestrator
    networks:
      - codebox-net

networks:
  codebox-net:
    name: codebox-net
    driver: bridge

volumes:
  postgres-data:
