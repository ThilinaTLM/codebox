services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: codebox
      POSTGRES_PASSWORD: codebox
      POSTGRES_DB: codebox
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - codebox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codebox"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: ./codebox-orchestrator
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
      - "50051:50051"
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: mount certs for gRPC TLS (generate with scripts/generate_grpc_certs.sh)
      # - ./certs:/etc/grpc-certs:ro
    environment:
      # ── Database ───────────────────────────────────────────────
      DATABASE_URL: "postgresql+asyncpg://codebox:codebox@postgres:5432/codebox"

      # ── Sandbox image ──────────────────────────────────────────
      # Build with: docker build -t codebox-sandbox:latest ./codebox-sandbox
      CODEBOX_IMAGE: "codebox-sandbox:latest"

      # ── URLs sandboxes use to reach this orchestrator ─────────
      # Compose-internal service names; override only if renaming services.
      ORCHESTRATOR_GRPC_PUBLIC_URL: "grpc://codebox-orchestrator:50051"
      ORCHESTRATOR_WS_PUBLIC_URL: "ws://codebox-orchestrator:9090"

      # ── Web UI CORS ────────────────────────────────────────────
      CORS_ORIGINS: "http://localhost:3737"

      # ── Required secrets ──────────────────────────────────────
      # Set via shell env or a repo-root .env file. Examples:
      #   ENCRYPTION_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
      #   AUTH_SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(64))")
      #   CALLBACK_SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(64))")
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      CALLBACK_SECRET: ${CALLBACK_SECRET:?CALLBACK_SECRET must be set}

      # ── Optional: gRPC TLS ─────────────────────────────────────
      # Uncomment together with the certs volume above.
      # GRPC_TLS_CERT: "/etc/grpc-certs/server.crt"
      # GRPC_TLS_KEY: "/etc/grpc-certs/server.key"
      # GRPC_TLS_CA_CERT: "/etc/grpc-certs/ca.crt"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codebox-net
      - codebox-sandbox-net  # Reachable by sandbox containers for gRPC callbacks

  web-ui:
    build:
      context: ./codebox-web-ui
      dockerfile: Dockerfile
    ports:
      - "3737:3737"
    environment:
      API_URL: "http://localhost:9090"
    depends_on:
      - orchestrator
    networks:
      - codebox-net

networks:
  codebox-net:
    name: codebox-net
    driver: bridge
  codebox-sandbox-net:
    name: codebox-sandbox-net
    driver: bridge

volumes:
  postgres-data:
