name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: thilinatlm

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: codebox-orchestrator
            context: ./codebox-orchestrator
            file: ./codebox-orchestrator/Dockerfile
          - image: codebox-web-ui
            context: ./codebox-web-ui
            file: ./codebox-web-ui/Dockerfile
          - image: codebox-sandbox
            context: .
            file: ./codebox-sandbox/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy orchestrator
        run: |
          curl -f -X GET "${{ secrets.COOLIFY_BASE_URL }}/api/v1/deploy?uuid=ylszwdvoxubo2schhpljxhhj&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Deploy web UI
        run: |
          curl -f -X GET "${{ secrets.COOLIFY_BASE_URL }}/api/v1/deploy?uuid=zqs2gkm2pqo0fgqu77y3qk05&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
