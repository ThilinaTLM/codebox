name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: thilinatlm

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      web-ui: ${{ steps.filter.outputs.web-ui }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            orchestrator:
              - 'codebox-orchestrator/**'
            web-ui:
              - 'codebox-web-ui/**'
            sandbox:
              - 'codebox-sandbox/**'
              - 'codebox-agent/**'

  build-orchestrator:
    needs: changes
    if: needs.changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/codebox-orchestrator
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: ./codebox-orchestrator
          file: ./codebox-orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,scope=orchestrator,mode=max

  build-web-ui:
    needs: changes
    if: needs.changes.outputs.web-ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/codebox-web-ui
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: ./codebox-web-ui
          file: ./codebox-web-ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=web-ui
          cache-to: type=gha,scope=web-ui,mode=max

  build-sandbox:
    needs: changes
    if: needs.changes.outputs.sandbox == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/codebox-sandbox
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./codebox-sandbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,scope=sandbox,mode=max

  deploy:
    needs: [changes, build-orchestrator, build-web-ui, build-sandbox]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy orchestrator
        if: needs.changes.outputs.orchestrator == 'true'
        run: |
          curl -f -X GET "${{ secrets.COOLIFY_BASE_URL }}/api/v1/deploy?uuid=ylszwdvoxubo2schhpljxhhj&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Deploy web UI
        if: needs.changes.outputs.web-ui == 'true'
        run: |
          curl -f -X GET "${{ secrets.COOLIFY_BASE_URL }}/api/v1/deploy?uuid=zqs2gkm2pqo0fgqu77y3qk05&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
